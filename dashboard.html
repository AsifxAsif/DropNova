<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="shortcut icon" href="resource/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.7.1/gsap.min.js"></script>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
</head>

<body>
    <div id="navbarContainer"></div>
    <div class="dashboard-wrapper">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <img src="./resource/DropNova.png" alt="DropNova Logo">
            </div>

            <div class="dashboard-actions">
                <button id="addFileBtn" class="btn" onclick="openModal()">Add File</button>
                <button class="btn" id="showMyFilesBtn">My Files</button>
                <button class="btn" id="showSharedFilesBtn">Shared with Me</button>
                <input type="text" id="search" placeholder="Search files..." />
            </div>

            <div class="file-section">
                <div id="my-files-view">
                    <div class="file-container" id="fileList"></div>
                </div>

                <div id="shared-files-view" style="display: none;">
                    <h2>Shared with Me</h2>
                    <div id="shared-files-wrapper">
                        <table id="shared-files-table">
                            <thead>
                                <tr>
                                    <th>Filename</th>
                                    <th>Shared By</th>
                                    <th>Permission</th>
                                    <th>Date</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="createFolderModal" class="modal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeFolderModal()"></i>
            <h3>Create New Folder</h3>
            <input type="text" id="folderName" placeholder="Folder Name" required />
            <button id="createFolder" class="upload-ok-button">Create</button>
            <button id="closeFolderModal" class="upload-ok-button">Close</button>
        </div>
    </div>

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeModal()"></i>
            <h3 id="selectFile">Select File</h3>
            <form id="uploadForm" enctype="multipart/form-data">
                <label class="custom-file-upload" for="file">
                    <div class="text">
                        <span id="clickUpload">Click to upload file</span>
                    </div>
                    <input type="file" id="file" name="file[]" multiple required />
                </label>
                <div id="file-name"></div>
                <button type="submit" class="upload-ok-button">OK</button>
            </form>
        </div>
    </div>

    <div class="modal" id="renameModal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeRenameModal()"></i>
            <h3 id="renameFile">Rename File</h3>
            <form id="renameForm">
                <input type="text" id="newFileName" placeholder="Enter new file name" required />
                <button type="submit" class="upload-ok-button" id="rename">Rename</button>
            </form>
        </div>
    </div>

    <div id="viewFileModal" class="modal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeViewFileModal()"></i>
            <div id="viewFileContent"></div>
        </div>
    </div>

    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeDeleteModal()"></i>
            <h3 id="deleteFile">Delete File</h3>
            <p id="deleteFileNameText">Are you sure you want to delete this file?</p>
            <div id="deleteMessage" style="margin-top: 10px; color: white; font-weight: bold;"></div>
            <div class="deleteButtons">
                <button id="confirmDelete" class="upload-ok-button">Delete</button>
                <button id="cancelDelete" onclick="closeDeleteModal()" class="upload-ok-button">Cancel</button>
            </div>
        </div>
    </div>

    <div id="share-modal" class="modal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeShareModal()"></i>
            <h3 id="shareFileTitle">Share File</h3>
            <p id="file">File: <strong id="file-to-share-name"></strong></p>
            <form id="share-form">
                <div class="share_flex">
                    <input type="hidden" id="share-file-id">
                    <label for="share-email" id="email">Email:</label>
                    <input type="email" id="share-email" placeholder="Recipient's email" required>
                </div>
                <div class="share_flex">
                    <label for="permission-select" id="permission">Permission:</label>
                    <select id="permission-select">
                        <option value="view" id="viewPermission">View</option>
                        <option value="edit" id="editPermission">Edit</option>
                        <option value="delete" id="deletePermission">Delete</option>
                    </select>
                </div>
                <p id="share-status" class="status-message"></p>
                <button type="submit" class="upload-ok-button" id="shareButton">Share</button>
            </form>
        </div>
    </div>

    <div id="comments-modal" class="modal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="closeCommentsModal()"></i>
            <h3>Comments on <strong id="file-comments-title"></strong></h3>
            <div id="comments-list"></div>
            <form id="comment-form">
                <input type="hidden" id="comment-file-id">
                <textarea id="comment-text" placeholder="Add a comment..." required></textarea>
                <button type="submit" class="upload-ok-button">Post Comment</button>
            </form>
        </div>
    </div>

    <script src="js/lang_handler.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
