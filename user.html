<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="css/user.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="shortcut icon" href="resource/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div id="navbarContainer"></div>

    <div class="container">
        <!-- Profile Section -->
        <div class="profile-section">
            <div class="form-box">
                <h1>User Profile</h1>
                <form id="updatePasswordForm" action="php/update_password.php" method="POST">
                    <div style="display: flex; justify-content: space-between; gap: 10px;">
                        <div class="input-box">
                            <input type="text" name="username" id="username" placeholder="Username" required disabled />
                        </div>

                        <div class="input-box">
                            <input type="email" name="email" id="email" placeholder="Email" required disabled />
                        </div>
                    </div>

                    <div class="input-box">
                        <input type="password" name="old_password" id="old_password" placeholder="Old Password"
                            required />
                        <i class="fas fa-eye" id="toggleOldPassword"
                            onclick="togglePassword('old_password', 'toggleOldPassword')"></i>
                    </div>

                    <div class="input-box">
                        <input type="password" name="new_password" id="new_password" placeholder="New Password"
                            required />
                        <i class="fas fa-eye" id="toggleNewPassword"
                            onclick="togglePassword('new_password', 'toggleNewPassword')"></i>
                    </div>

                    <button type="submit" class="btn">Update Password</button>
                </form>
                <div id="message"></div>
            </div>

            <!-- File Tree Section -->
            <div class="file-tree-container">
                <div class="file-tree-header">
                    <i class="fas fa-folder-tree file-tree-icon"></i>
                    <p>Project Structure</p>
                </div>
                <div class="file-tree-content">
                    <ul id="projectTree" class="project-tree"></ul>
                </div>
            </div>
        </div>

        <!-- Insights Section -->
        <div class="insights-section">
            <h2>Your Insights</h2>
            <div class="stats-cards">
                <div class="card">
                    <i class="fas fa-upload card-icon"></i>
                    <p>Total Files</p>
                    <h3 id="totalFilesCount">0</h3>
                </div>

                <div class="card">
                    <i class="fas fa-download card-icon"></i>
                    <p>Total Downloads</p>
                    <h3 id="totalDownloadsCount">0</h3>
                </div>

                <div class="card">
                    <i class="fas fa-share-alt card-icon"></i>
                    <p>Files Shared</p>
                    <h3 id="filesSharedCount">0</h3>
                </div>
            </div>

            <div class="chart-container">
                <h3>File Type Distribution</h3>
                <canvas id="fileTypeChart"></canvas>
            </div>

            <div class="chart-container">
                <h3>Activity Trend (Last 7 Days)</h3>
                <canvas id="activityChart"></canvas>
            </div>
        </div>
    </div>

    <script src="js/user.js"></script>
</body>

</html>
