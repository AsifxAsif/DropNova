<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="css/user.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="shortcut icon" href="resource/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .switch {
            --_switch-bg-clr: #70a9c5;
            --_switch-padding: 4px;
            /* padding around button*/
            --_slider-bg-clr: rgba(12, 74, 110, 0.65);
            /* slider color unchecked */
            --_slider-bg-clr-on: rgba(12, 74, 110, 1);
            /* slider color checked */
            --_slider-txt-clr: #ffffff;
            --_label-padding: 1rem 2rem;
            /* padding around the labels - this gives the switch it's global width and height */
            --_switch-easing: cubic-bezier(0.47,
                    1.64,
                    0.41,
                    0.8);
            /* easing on toggle switch */
            color: white;
            width: fit-content;
            display: flex;
            justify-content: center;
            position: relative;
            border-radius: 9999px;
            cursor: pointer;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            position: relative;
            isolation: isolate;
        }

        .switch input[type="checkbox"] {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        .switch>span {
            display: grid;
            place-content: center;
            transition: opacity 300ms ease-in-out 150ms;
            padding: var(--_label-padding);
        }

        .switch::before,
        .switch::after {
            content: "";
            position: absolute;
            border-radius: inherit;
            transition: inset 150ms ease-in-out;
        }

        /* switch slider */
        .switch::before {
            background-color: var(--_slider-bg-clr);
            inset: var(--_switch-padding) 50% var(--_switch-padding) var(--_switch-padding);
            transition:
                inset 500ms var(--_switch-easing),
                background-color 500ms ease-in-out;
            z-index: -1;
            box-shadow:
                inset 0 1px 1px rgba(0, 0, 0, 0.3),
                0 1px rgba(255, 255, 255, 0.3);
        }

        /* switch bg color */
        .switch::after {
            background-color: var(--_switch-bg-clr);
            inset: 0;
            z-index: -2;
        }

        /* switch hover & focus */
        .switch:focus-within::after {
            inset: -0.25rem;
        }

        .switch:has(input:checked):hover>span:first-of-type,
        .switch:has(input:not(:checked)):hover>span:last-of-type {
            opacity: 1;
            transition-delay: 0ms;
            transition-duration: 100ms;
        }

        /* switch hover */
        .switch:has(input:checked):hover::before {
            inset: var(--_switch-padding) var(--_switch-padding) var(--_switch-padding) 45%;
        }

        .switch:has(input:not(:checked)):hover::before {
            inset: var(--_switch-padding) 45% var(--_switch-padding) var(--_switch-padding);
        }

        /* checked - move slider to right */
        .switch:has(input:checked)::before {
            background-color: var(--_slider-bg-clr-on);
            inset: var(--_switch-padding) var(--_switch-padding) var(--_switch-padding) 50%;
        }

        /* checked - set opacity */
        .switch>span:last-of-type,
        .switch>input:checked+span:first-of-type {
            opacity: 0.75;
        }

        .switch>input:checked~span:last-of-type {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div id="navbarContainer"></div>

    <div class="container">
        <div class="profile-section">
            <div class="form-box">
                <h1 id="userProfileTitle">User Profile</h1>
                <form id="updatePasswordForm" action="php/update_password.php" method="POST">
                    <div style="display: flex; justify-content: space-between; gap: 10px;">
                        <div class="input-box">
                            <input type="text" name="username" id="username" placeholder="Username" required disabled />
                        </div>

                        <div class="input-box">
                            <input type="email" name="email" id="email" placeholder="Email" required disabled />
                        </div>
                    </div>

                    <div class="input-box">
                        <input type="password" name="old_password" id="oldPasswordPlaceholder"
                            placeholder="Old Password" required />
                        <i class="fas fa-eye" id="toggleOldPassword"
                            onclick="togglePassword('oldPasswordPlaceholder', 'toggleOldPassword')"></i>
                    </div>

                    <div class="input-box">
                        <input type="password" name="new_password" id="newPasswordPlaceholder"
                            placeholder="New Password" required />
                        <i class="fas fa-eye" id="toggleNewPassword"
                            onclick="togglePassword('newPasswordPlaceholder', 'toggleNewPassword')"></i>
                    </div>

                    <div style="display: flex; justify-content: space-between; gap: 10px;">
                        <button type="submit" class="btn" id="updatePasswordBtn">Update Password</button>
                        <button type="button" class="btn logout-btn" id="logoutButton"
                            onclick="logout()">Logout</button>
                    </div>
                </form>
                <div id="message"></div>
            </div>

            <div class="file-tree-container">
                <div class="file-tree-header">
                    <i class="fas fa-folder-tree file-tree-icon"></i>
                    <p id="myDirectoryTitle">My directory</p>
                </div>
                <div class="file-tree-content">
                    <ul id="projectTree" class="project-tree"></ul>
                </div>
            </div>
        </div>

        <div class="insights-section">
            <div class="header">
                <h2 id="yourInsightsTitle">Your Insights</h2>
                <div style="text-align: right; padding: 10px;">
                    <label for="languageToggle" class="switch" aria-label="Toggle Language">
                        <input type="checkbox" id="languageToggle" />
                        <span class="lang-switcher" data-lang="en">English</span>
                        <span class="lang-switcher" data-lang="bn">বাংলা</span>
                    </label>
                </div>
            </div>
            <div class="stats-cards">
                <div class="card">
                    <i class="fas fa-upload card-icon"></i>
                    <p id="totalFiles">Total Files</p>
                    <h3 id="totalFilesCount">0</h3>
                </div>

                <div class="card">
                    <i class="fas fa-download card-icon"></i>
                    <p id="totalDownloads">Total Downloads</p>
                    <h3 id="totalDownloadsCount">0</h3>
                </div>

                <div class="card">
                    <i class="fas fa-share-alt card-icon"></i>
                    <p id="filesShared">Files Shared</p>
                    <h3 id="filesSharedCount">0</h3>
                </div>
            </div>

            <div class="chart-container">
                <h3 id="fileTypeDistribution">File Type Distribution</h3>
                <canvas id="fileTypeChart"></canvas>
            </div>

            <div class="chart-container">
                <h3 id="activityTrend">Activity Trend (Last 7 Days)</h3>
                <canvas id="activityChart"></canvas>
            </div>
        </div>
    </div>

    <script src="js/lang_handler.js"></script>
    <script src="js/user.js"></script>
</body>

</html>
